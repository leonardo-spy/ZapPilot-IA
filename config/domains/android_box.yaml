# Referências para classificação por embeddings (usadas em extract_patterns e cleaner)
references:
  # Msgs curtas que SÃO noise (sem valor informativo)
  noise:
    - ok
    - sim
    - não
    - beleza
    - certo
    - entendi
    - "👍"
    - obrigado
    - valeu
    - blz
    - haha
    - kkk

  # Msgs curtas que NÃO são noise (perguntas válidas curtas)
  valid_short:
    - quanto custa
    - como funciona
    - tem disponível
    - qual o preço
    - preciso de ajuda
    - não funciona
    - qual canal
    - como configurar

  # Referências de spam (para validação por embedding)
  spam:
    - encaminhe essa mensagem para 10 pessoas
    - clique no link para ganhar prêmio
    - promoção imperdível de celular grátis
    - você foi sorteado
    - compartilhe com seus amigos

  # Referências de feedback positivo (para classificação por embedding)
  feedback_positive:
    - resolveu meu problema
    - deu certo
    - funcionou
    - obrigado ajudou
    - perfeito
    - show de bola
    - tá funcionando agora
    - muito bom
    - excelente atendimento
    - voltou ao normal
    - maravilha

  # Referências de feedback negativo (para classificação por embedding)
  feedback_negative:
    - não resolveu
    - continua com problema
    - piorou
    - não funcionou
    - mesmo erro
    - ainda não funciona
    - não adiantou
    - voltou o problema
    - péssimo
    - horrível
    - não ajudou nada

  # Referências neutras (NÃO são feedback — para desambiguação)
  neutral:
    - quanto custa
    - como funciona
    - quero comprar
    - tem disponível
    - qual o prazo
    - bom dia

