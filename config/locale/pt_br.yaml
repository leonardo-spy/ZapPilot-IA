# ============================================================================
# LOCALE — Português (Brasil) — OVERRIDE
# ============================================================================
# Only user-facing strings that must appear in Portuguese go here.
# All other keys fallback to en_us.yaml (the primary/base locale).
# ============================================================================

language: pt_br

# --- Human handoff (shown directly to user) ---
human_handoff:
  response: "Vou encaminhar para suporte humano para verificar melhor seu caso. Um atendente entrará em contato em breve."

# --- Farewell ---
farewell:
  response: "Qualquer coisa é só chamar! Fico à disposição 👋"

# --- Post-farewell prompt suffix ---
post_farewell_note:
  prompt_suffix: "\n\nIMPORTANTE: A conversa já foi encerrada com despedida. Responda de forma breve e direta. NÃO ofereça suporte humano nem reinicie o atendimento de vendas."

# --- Error/fallback responses (shown directly to user) ---
errors:
  technical_difficulty: "Desculpe, estou com dificuldade técnica. Vou encaminhar para suporte humano."
  low_confidence_suffix: "\n\n_Se precisar de mais informações, posso encaminhar para um atendente._"

